<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Certificate – Mr.Certi</title>
  <meta name="description" content="View and download your certificate from Mr.Certi" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .bg-glow {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-1 { background: #0ea5e9; top: -100px; left: -100px; }
    .bg-glow-2 { background: #8b5cf6; bottom: -100px; right: -100px; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }
    .brand svg { flex-shrink: 0; }
    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    .brand-name span { color: #0ea5e9; }

    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 20px;
      padding: 40px;
      opacity: 0;
      animation: slideUp 0.6s ease 0.15s forwards;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }
    .participant-name {
      color: #0ea5e9;
      font-weight: 600;
    }

    .cert-image-wrapper {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 28px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .cert-image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white;
      box-shadow: 0 4px 16px rgba(14, 165, 233, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(14, 165, 233, 0.4);
    }
    .btn-secondary {
      background: rgba(148, 163, 184, 0.1);
      color: #f1f5f9;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(148, 163, 184, 0.2);
      transform: translateY(-2px);
    }

    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(148, 163, 184, 0.2);
      border-top: 3px solid #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Error state */
    .error-state {
      padding: 60px 0;
    }
    .error-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .error-msg {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .footer-note {
      margin-top: 24px;
      color: #64748b;
      font-size: 0.8rem;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.3s forwards;
    }
    .footer-note a {
      color: #0ea5e9;
      text-decoration: none;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .card { padding: 24px; }
      .card-title { font-size: 1.2rem; }
      .btn { padding: 10px 20px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="url(#brandG)"/>
        <path d="M7 10h14M7 14h10M7 18h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="21" cy="18" r="3" fill="white" opacity="0.9"/>
        <defs><linearGradient id="brandG" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#0284c7"/></linearGradient></defs>
      </svg>
      <span class="brand-name">Mr.<span>Certi</span></span>
    </div>

    <div class="card" id="certCard">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <span style="color:#94a3b8">Loading your certificate…</span>
      </div>

      <div id="certContent" style="display:none">
        <div class="card-title">🏆 Certificate Issued</div>
        <div class="card-subtitle">Congratulations, <span class="participant-name" id="certName"></span>!</div>
        <div class="cert-image-wrapper">
          <img id="certImage" alt="Certificate" />
        </div>
        <div class="actions">
          <a id="downloadBtn" class="btn btn-primary" download>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v10M5 8l4 4 4-4M3 14h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Download Certificate
          </a>
          <button class="btn btn-secondary" onclick="window.print()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="4" y="7" width="10" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V4a1 1 0 011-1h6a1 1 0 011 1v3" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="10" r="0.8" fill="currentColor"/></svg>
            Print
          </button>
        </div>
      </div>

      <div id="errorState" style="display:none" class="error-state">
        <div class="error-icon">😕</div>
        <div class="card-title">Certificate Not Found</div>
        <div class="error-msg" id="errorMsg">This certificate link may be invalid or expired.</div>
      </div>
    </div>

    <div class="footer-note">
      Powered by <a href="index.html">Mr.Certi</a> — E-Certificate Distribution Platform
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBuTV1Yeh77iWt8nJ8V09gUNUhagyhg4iY",
      authDomain: "mr-certi.firebaseapp.com",
      projectId: "mr-certi",
      storageBucket: "mr-certi.firebasestorage.app",
      messagingSenderId: "60676407665",
      appId: "1:60676407665:web:1113311464e6b6dc45b6d0",
      measurementId: "G-CRDZXN6TYD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const participantId = params.get('id');

    const loadingState = document.getElementById('loadingState');
    const certContent = document.getElementById('certContent');
    const errorState = document.getElementById('errorState');

    async function loadCertificate() {
      if (!participantId) {
        showError('No certificate ID provided. Please use the link from your email.');
        return;
      }

      try {
        // Attempt anonymous login to bypass 'request.auth != null' rules
        try {
          await signInAnonymously(auth);
        } catch (authErr) {
          console.warn("Anonymous auth failed, attempting unauthenticated fetch...", authErr);
        }

        const snap = await getDoc(doc(db, 'participants', participantId));
        if (!snap.exists()) {
          showError('Certificate not found. The link may be invalid.');
          return;
        }

        const data = snap.data();
        if (!data.certificateUrl) {
          showError('Your certificate has not been generated yet. Please check back later.');
          return;
        }

        // Show certificate
        document.getElementById('certName').textContent = data.name || 'Participant';
        document.getElementById('certImage').src = data.certificateUrl;
        document.getElementById('downloadBtn').href = data.certificateUrl;
        document.getElementById('downloadBtn').download = `${data.name || 'certificate'}_certificate.jpg`;

        document.title = `${data.name}'s Certificate – Mr.Certi`;

        loadingState.style.display = 'none';
        certContent.style.display = 'block';

      } catch (e) {
        console.error('Error loading certificate:', e);
        if (e.code === 'permission-denied') {
          showError('Permission Denied. The Organizer must update their Firestore Security Rules to allow public read access.');
        } else {
          showError('Failed to load certificate. Please try again later.');
        }
      }
    }

    function showError(msg) {
      loadingState.style.display = 'none';
      errorState.style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }

    loadCertificate();
  </script>
</body>
</html>
