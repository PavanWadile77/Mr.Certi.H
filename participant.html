<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Certificates – Mr.Certi</title>
  <meta name="description" content="View and download your certificates on Mr.Certi"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body style="background:var(--gray-50)">

<div class="page-loading" id="pageLoading">
  <div class="nav-brand">
    <div class="brand-icon">
      <svg width="36" height="36" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#lg1)"/><path d="M7 10h14M7 14h10M7 18h8" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="21" cy="18" r="3" fill="white" opacity="0.9"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#0284c7"/></linearGradient></defs></svg>
    </div>
    <span class="brand-name">Mr.<span>Certi</span></span>
  </div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="dashboard-wrapper" id="dashboardWrapper" style="display:none">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#sblg)"/><path d="M7 10h14M7 14h10M7 18h8" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="21" cy="18" r="3" fill="white" opacity="0.9"/><defs><linearGradient id="sblg" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#0284c7"/></linearGradient></defs></svg>
        </div>
        <span class="brand-name">Mr.<span>Certi</span></span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Menu</div>
        <button class="nav-item active" data-panel="mycerts" id="navMyCerts">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l2.5 5 5.5.8-4 3.9.94 5.5L9 14.8l-4.94 2.4.94-5.5-4-3.9 5.5-.8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
          My Certificates
        </button>
        <button class="nav-item" data-panel="profile" id="navProfile">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 16c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          Profile
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">P</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role">Participant</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M10 11l4-4-4-4M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="menuBtn" aria-label="Menu">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 6h16M3 11h16M3 16h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <div><div class="topbar-title">My Certificates</div><div class="topbar-subtitle">Participant Panel</div></div>
      </div>
    </header>

    <main class="page-content">
      <!-- My Certs Panel -->
      <div class="panel active" id="panel-mycerts">
        <div class="cert-hero">
          <div class="cert-hero-icon">🏆</div>
          <h2 id="heroGreeting">Welcome back!</h2>
          <p id="heroSubtext">Your certificates are listed below</p>
        </div>

        <div id="certsContainer">
          <div class="table-empty" style="padding:60px"><span class="empty-icon">📜</span><br/>No certificates available yet.<br/><span style="font-size:.8rem;color:var(--gray-400)">Certificates will appear here once issued by an organizer.</span></div>
        </div>
      </div>

      <!-- Profile Panel -->
      <div class="panel" id="panel-profile">
        <div class="page-header"><h1 class="page-title">My Profile</h1></div>
        <div class="card">
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
              <div class="user-avatar" style="width:64px;height:64px;font-size:1.5rem" id="profileAvatar">P</div>
              <div><div style="font-size:1.2rem;font-weight:700;color:var(--gray-900)" id="profileName">—</div><div style="font-size:.85rem;color:var(--gray-500)" id="profileEmail">—</div><span class="badge badge-info" style="margin-top:6px">Participant</span></div>
            </div>
            <div class="form-group"><label>Full Name</label><input type="text" id="editName" placeholder="Your name"/></div>
            <button class="btn-primary" id="updateProfileBtn">Update Profile</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script type="module" src="js/participant.js"></script>
</body>
</html>
